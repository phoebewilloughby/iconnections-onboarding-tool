<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iConnections Onboarding</title>
<style>
/* ── Variables ─────────────────────────────────────────────────────────── */
:root {
  --brand:        #6A2B7E;
  --brand-hover:  #7D3494;
  --brand-dark:   #4A1A5E;
  --brand-light:  #F3ECF7;
  --brand-muted:  #EDE0F3;

  --sidebar-bg:   #160824;
  --sidebar-hover: rgba(106,43,126,0.25);
  --sidebar-active: rgba(106,43,126,0.45);
  --sidebar-text:  rgba(255,255,255,0.62);
  --sidebar-head:  rgba(255,255,255,0.35);

  --bg:       #F5F6F8;
  --surface:  #FFFFFF;
  --border:   #E4E6EA;
  --border-2: #D1D5DB;

  --text-1: #111827;
  --text-2: #4B5563;
  --text-3: #9CA3AF;

  --green:    #059669; --green-bg:  #D1FAE5;
  --blue:     #2563EB; --blue-bg:   #DBEAFE;
  --red:      #DC2626; --red-bg:    #FEE2E2;
  --amber:    #D97706; --amber-bg:  #FEF3C7;
  --orange:   #EA580C; --orange-bg: #FFF7ED;
  --gray:     #6B7280; --gray-bg:   #F3F4F6;

  --radius: 6px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow:    0 4px 12px rgba(0,0,0,0.08);
}

/* ── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
       background: var(--bg); color: var(--text-1); font-size: 14px; line-height: 1.5;
       -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font: inherit; }
input, select, textarea { font: inherit; }
table { border-collapse: collapse; width: 100%; }

/* ── App Layout ────────────────────────────────────────────────────────── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ───────────────────────────────────────────────────────────── */
#sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.sb-brand {
  padding: 20px 16px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sb-logo {
  width: 30px; height: 30px; border-radius: 7px;
  background: var(--brand);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sb-name { font-weight: 700; font-size: 14px; color: #fff; letter-spacing: -0.01em; }
.sb-sub  { font-size: 11px; color: var(--sidebar-text); margin-top: 1px; }

.sb-section { padding: 12px 8px 4px; }
.sb-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--sidebar-head);
  padding: 0 8px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 5px;
  color: var(--sidebar-text); font-size: 13.5px; font-weight: 500;
  transition: background 0.12s, color 0.12s;
  cursor: pointer; margin-bottom: 1px;
}
.nav-item:hover  { background: var(--sidebar-hover); color: rgba(255,255,255,0.88); }
.nav-item.active { background: var(--sidebar-active); color: #fff; }
.nav-item svg    { flex-shrink: 0; opacity: 0.8; }
.nav-item.active svg { opacity: 1; }

.sb-spacer { flex: 1; }
.sb-footer {
  padding: 12px 16px;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; gap: 8px;
}
.conn-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gray); flex-shrink: 0;
  transition: background 0.3s;
}
.conn-dot.live { background: var(--green); box-shadow: 0 0 0 2px rgba(5,150,105,0.25); }
.conn-dot.err  { background: var(--red); }

/* ── Main area ─────────────────────────────────────────────────────────── */
#main-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Topbar ────────────────────────────────────────────────────────────── */
#topbar {
  height: 56px; flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 24px;
  z-index: 10;
}
#breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-3); flex-shrink: 0;
}
#breadcrumb a { color: var(--text-3); }
#breadcrumb a:hover { color: var(--brand); }
#breadcrumb .crumb-cur { color: var(--text-2); font-weight: 500; }
#breadcrumb .sep { color: var(--text-3); font-size: 12px; }

.search-wrap {
  flex: 1; position: relative; max-width: 400px; margin: 0 auto;
}
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); pointer-events: none;
}
#gsearch {
  width: 100%; height: 34px;
  padding: 0 12px 0 34px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 20px; font-size: 13px; color: var(--text-1);
  outline: none; transition: border 0.15s, box-shadow 0.15s;
}
#gsearch:focus {
  border-color: var(--brand); background: var(--surface);
  box-shadow: 0 0 0 3px var(--brand-light);
}
.gsearch-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  z-index: 100; max-height: 320px; overflow-y: auto;
}
.gsearch-results.hidden { display: none; }
.gsearch-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.gsearch-item:last-child { border-bottom: none; }
.gsearch-item:hover { background: var(--bg); }
.gsearch-item-id { font-family: monospace; font-size: 12px; color: var(--brand); font-weight: 600; flex-shrink: 0; }
.gsearch-item-name { font-weight: 500; flex: 1; }

.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ── Page content ──────────────────────────────────────────────────────── */
#page { flex: 1; overflow-y: auto; padding: 28px 28px 48px; }

/* ── Buttons ───────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 34px; border-radius: var(--radius);
  font-size: 13.5px; font-weight: 500; transition: background 0.12s, opacity 0.12s;
  white-space: nowrap;
}
.btn-primary { background: var(--brand); color: white; }
.btn-primary:hover { background: var(--brand-hover); }
.btn-secondary {
  background: var(--surface); color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg); border-color: var(--border-2); }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12.5px; }
.btn:disabled { opacity: 0.55; cursor: not-allowed; }

/* ── Pills ─────────────────────────────────────────────────────────────── */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11.5px; font-weight: 600; line-height: 1.6;
  white-space: nowrap;
}
.pill-complete  { background: var(--green-bg);  color: var(--green);  }
.pill-running   { background: var(--blue-bg);   color: var(--blue);   }
.pill-pending   { background: var(--gray-bg);   color: var(--gray);   }
.pill-failed    { background: var(--red-bg);    color: var(--red);    }
.pill-followup  { background: var(--amber-bg);  color: var(--amber);  }
.pill-manual    { background: var(--orange-bg); color: var(--orange); }
.pill-enterprise{ background: var(--brand-light); color: var(--brand); }
.pill-scale     { background: #EEF2FF; color: #4338CA; }
.pill-new-client     { background: #ECFDF5; color: #047857; }
.pill-platform-renewal { background: #EEF2FF; color: #4338CA; }
.pill-event-only     { background: #FFF7ED; color: #9A3412; }

/* ── Page header ───────────────────────────────────────────────────────── */
.page-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px;
}
.page-head h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.page-head p  { font-size: 13px; color: var(--text-3); margin-top: 2px; }
.page-head-actions { display: flex; gap: 8px; align-items: center; }

/* ── KPI cards ─────────────────────────────────────────────────────────── */
.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  box-shadow: var(--shadow-sm);
}
.kpi-label { font-size: 11.5px; font-weight: 600; color: var(--text-3);
             text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.kpi-sub   { font-size: 12px; color: var(--text-3); margin-top: 5px; }

/* ── Cards / panels ────────────────────────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.card-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-head h2 { font-size: 14px; font-weight: 600; }
.card-body { padding: 20px; }
.card-empty {
  padding: 48px 20px; text-align: center;
  color: var(--text-3); font-size: 13px;
}

/* ── Activity feed ─────────────────────────────────────────────────────── */
.activity-item {
  display: flex; gap: 12px; padding: 11px 20px;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.activity-item:last-child { border-bottom: none; }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border-2); flex-shrink: 0; margin-top: 5px;
}
.activity-dot.manual   { background: var(--orange); }
.activity-dot.complete { background: var(--green); }
.activity-dot.failed   { background: var(--red); }
.activity-dot.followup { background: var(--amber); }
.activity-dot.running  { background: var(--blue); }
.activity-body { flex: 1; min-width: 0; }
.activity-line { font-size: 13px; line-height: 1.5; }
.activity-line strong { font-weight: 600; }
.activity-line a:hover { color: var(--brand); text-decoration: underline; }
.activity-time { font-size: 11.5px; color: var(--text-3); white-space: nowrap; margin-top: 3px; }

/* ── Table ─────────────────────────────────────────────────────────────── */
.tbl-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm);
}
.tbl-toolbar {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.tbl-search-wrap { position: relative; }
.tbl-search-wrap svg {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); pointer-events: none;
}
.tbl-search {
  height: 30px; padding: 0 10px 0 30px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 13px; width: 220px;
  outline: none;
}
.tbl-search:focus { border-color: var(--brand); background: white; }

.filter-chips { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.filter-label { font-size: 11px; color: var(--text-3); font-weight: 600; white-space: nowrap; }
.chip {
  height: 26px; padding: 0 10px;
  border-radius: 20px; font-size: 11.5px; font-weight: 500;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-2); cursor: pointer; transition: all 0.1s;
  white-space: nowrap;
}
.chip:hover  { border-color: var(--brand); color: var(--brand); }
.chip.active { background: var(--brand-light); border-color: var(--brand); color: var(--brand); font-weight: 600; }

.tbl-count { margin-left: auto; font-size: 12px; color: var(--text-3); white-space: nowrap; }

table th {
  padding: 9px 14px; text-align: left;
  font-size: 11.5px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.04em;
  background: var(--bg); border-bottom: 1px solid var(--border);
  white-space: nowrap; cursor: pointer; user-select: none;
}
table th:hover { color: var(--text-2); }
table th.sorted { color: var(--brand); }
table th .sa { display: inline-block; margin-left: 3px; font-size: 10px; }

table td {
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  font-size: 13px; vertical-align: middle;
}
table tr:last-child td { border-bottom: none; }
table tr.clickable { cursor: pointer; transition: background 0.1s; }
table tr.clickable:hover td { background: var(--bg); }

.cell-id  { font-family: monospace; font-size: 12px; font-weight: 600; color: var(--brand); }
.cell-num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }

.pipeline-pips { display: flex; gap: 2px; }
.pip {
  width: 7px; height: 7px; border-radius: 1.5px;
  background: var(--bg); border: 1px solid var(--border-2);
}
.pip.complete { background: var(--green);  border-color: transparent; }
.pip.running  { background: var(--blue);   border-color: transparent; }
.pip.failed   { background: var(--red);    border-color: transparent; }

.manual-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10.5px; font-weight: 600; color: var(--orange);
  background: var(--orange-bg); padding: 1px 6px; border-radius: 10px;
}

/* ── Deal detail header ────────────────────────────────────────────────── */
.deal-header {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px 24px;
  margin-bottom: 20px; box-shadow: var(--shadow-sm);
}
.deal-header-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
}
.deal-header-title h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.deal-meta {
  display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap;
}
.deal-id { font-family: monospace; font-size: 12px; background: var(--bg);
           padding: 2px 8px; border-radius: 4px; color: var(--brand); font-weight: 600;
           border: 1px solid var(--border); }
.deal-header-stats {
  display: flex; gap: 24px; margin-top: 16px; padding-top: 16px;
  border-top: 1px solid var(--border); flex-wrap: wrap;
}
.deal-stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase;
                   letter-spacing: 0.05em; color: var(--text-3); }
.deal-stat-value { font-size: 17px; font-weight: 700; margin-top: 2px; letter-spacing: -0.01em; }
.deal-stat-value.brand { color: var(--brand); }

/* ── Tabs ──────────────────────────────────────────────────────────────── */
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.tab-btn {
  padding: 10px 18px; font-size: 13.5px; font-weight: 500; color: var(--text-3);
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  cursor: pointer; transition: color 0.15s, border-color 0.15s; white-space: nowrap;
}
.tab-btn:hover  { color: var(--text-1); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 600; }
.tab-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: var(--gray-bg); border-radius: 9px;
  font-size: 10.5px; font-weight: 700; margin-left: 5px; color: var(--text-3);
}
.tab-btn.active .tab-count { background: var(--brand-light); color: var(--brand); }

/* ── Detail layout ─────────────────────────────────────────────────────── */
.detail-layout { display: grid; grid-template-columns: 1fr 256px; gap: 20px; }
.sidebar-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.sidebar-section-head {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text-3);
  background: var(--bg);
}
.sidebar-row {
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 2px;
}
.sidebar-row:last-child { border-bottom: none; }
.sidebar-row-label { font-size: 10.5px; color: var(--text-3); font-weight: 600;
                     text-transform: uppercase; letter-spacing: 0.04em; }
.sidebar-row-value { font-size: 12.5px; color: var(--text-1); font-weight: 500; word-break: break-all; }
.sidebar-row-value.mono { font-family: monospace; font-size: 11.5px; color: var(--brand); }

/* ── Timeline ──────────────────────────────────────────────────────────── */
.timeline { position: relative; padding-left: 32px; }
.timeline::before {
  content: ''; position: absolute; left: 11px; top: 6px; bottom: 6px;
  width: 2px; background: var(--border);
}
.tl-item { position: relative; padding: 0 0 24px 20px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-dot {
  position: absolute; left: -20px; top: 3px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--surface); border: 2px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; z-index: 1;
}
.tl-dot.complete { border-color: var(--green); color: var(--green); }
.tl-dot.running  { border-color: var(--blue);  color: var(--blue);  }
.tl-dot.failed   { border-color: var(--red);   color: var(--red);   }
.tl-dot.pending  { border-color: var(--border-2); color: var(--text-3); }
.tl-dot.manual   { border-color: var(--orange); background: var(--orange-bg); color: var(--orange); }

.tl-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px; box-shadow: var(--shadow-sm);
}
.tl-card.manual-card  { border-left: 3px solid var(--orange); }
.tl-card.failed-card  { border-left: 3px solid var(--red); }
.tl-card.followup-card{ border-left: 3px solid var(--amber); }

.tl-card-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;
}
.tl-stage-badge {
  width: 22px; height: 22px; border-radius: 5px;
  background: var(--brand); color: white; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tl-stage-badge.dim    { background: var(--gray-bg);   color: var(--gray); }
.tl-stage-badge.fail   { background: var(--red-bg);    color: var(--red); }
.tl-stage-badge.manual { background: var(--orange-bg); color: var(--orange); }
.tl-title  { font-size: 13px; font-weight: 600; flex: 1; }
.tl-time   { font-size: 11.5px; color: var(--text-3); }
.tl-dur    { font-size: 11px; color: var(--text-3); background: var(--bg);
             padding: 1px 6px; border-radius: 4px; }
.tl-rows   { display: flex; flex-direction: column; gap: 4px; }
.tl-row    { display: flex; gap: 8px; font-size: 12.5px; }
.tl-k { color: var(--text-3); width: 110px; flex-shrink: 0; }
.tl-v { color: var(--text-2); word-break: break-all; }
.tl-v.mono { font-family: monospace; font-size: 11.5px; color: var(--brand); }

/* ── Email cards ───────────────────────────────────────────────────────── */
.email-list { display: flex; flex-direction: column; gap: 12px; }
.email-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden;
}
.email-card.inbound  { border-left: 3px solid var(--blue); }
.email-card.outbound { border-left: 3px solid var(--brand); }
.email-card-head {
  padding: 10px 16px; background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.email-dir {
  font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 3px; flex-shrink: 0;
}
.email-dir.out { background: var(--brand-light); color: var(--brand); }
.email-dir.in  { background: var(--blue-bg); color: var(--blue); }
.email-type-lbl { font-size: 12.5px; font-weight: 600; flex: 1; }
.email-ts { font-size: 11.5px; color: var(--text-3); white-space: nowrap; }
.email-fields { padding: 8px 16px; border-bottom: 1px solid var(--border); }
.ef { display: flex; gap: 8px; font-size: 12.5px; padding: 2px 0; }
.ef-k { width: 46px; color: var(--text-3); font-weight: 600; flex-shrink: 0; }
.ef-v { color: var(--text-2); }
.email-subj { padding: 10px 16px; font-size: 13px; font-weight: 600;
              border-bottom: 1px solid var(--border); }
.email-body { padding: 14px 16px; font-size: 13px; line-height: 1.7;
              white-space: pre-wrap; color: var(--text-2); max-height: 240px;
              overflow-y: auto; }

/* ── Audit table ───────────────────────────────────────────────────────── */
.audit-tbl td:first-child { font-size: 11.5px; color: var(--text-3); white-space: nowrap; }
.audit-action { font-family: monospace; font-size: 12px; }
.audit-data {
  font-family: monospace; font-size: 11px; color: var(--text-3);
  max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: help;
}
tr.audit-manual td { background: rgba(234,88,12,0.04); }
tr.audit-manual .audit-action { color: var(--orange); }

/* ── Manual form ───────────────────────────────────────────────────────── */
.manual-form {
  background: var(--orange-bg); border: 1px solid rgba(234,88,12,0.25);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px;
}
.manual-form h3 { font-size: 12.5px; font-weight: 600; color: var(--orange); margin-bottom: 10px; }
.manual-row { display: flex; gap: 8px; flex-wrap: wrap; }
.f-input {
  height: 32px; padding: 0 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 13px; outline: none; flex: 1; min-width: 140px;
  background: var(--surface);
}
.f-input:focus { border-color: var(--orange); }

/* ── New deal form ─────────────────────────────────────────────────────── */
.form-section { margin-bottom: 24px; }
.form-section-title {
  font-size: 11.5px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.06em;
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.s2 { grid-column: span 2; }
label { font-size: 12px; font-weight: 600; color: var(--text-2); }
.fc {
  height: 36px; padding: 0 12px;
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 13.5px; color: var(--text-1); background: var(--surface);
  outline: none; transition: border 0.15s, box-shadow 0.15s;
}
.fc:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }
select.fc { cursor: pointer; }
.fhint { font-size: 11px; color: var(--text-3); }

/* ── Attention panel ───────────────────────────────────────────────────── */
.attention-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s;
}
.attention-item:last-child { border-bottom: none; }
.attention-item:hover { background: var(--bg); }
.att-icon {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 13px;
}
.att-icon.followup { background: var(--amber-bg); }
.att-icon.failed   { background: var(--red-bg); }
.att-icon.manual   { background: var(--orange-bg); }
.att-body { flex: 1; min-width: 0; }
.att-name { font-weight: 600; font-size: 13px; }
.att-sub  { font-size: 11.5px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Home grid ─────────────────────────────────────────────────────────── */
.home-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }

/* ── Toast ─────────────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--text-1); color: white;
  padding: 11px 16px; border-radius: var(--radius);
  font-size: 13.5px; box-shadow: var(--shadow);
  transform: translateY(60px); opacity: 0;
  transition: transform 0.2s, opacity 0.2s; pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      </div>
      <div>
        <div class="sb-name">iConnections</div>
        <div class="sb-sub">Onboarding</div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Main</div>
      <div class="nav-item" id="nav-home" onclick="navigate('/')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </div>
      <div class="nav-item" id="nav-deals" onclick="navigate('/deals')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        All Deals
      </div>
      <div class="nav-item" id="nav-new" onclick="navigate('/new')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        New Deal
      </div>
    </div>
    <div class="sb-spacer"></div>
    <div class="sb-footer">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label" style="font-size:11.5px;color:var(--sidebar-text)">Connecting…</span>
    </div>
  </aside>

  <div id="main-wrap">
    <header id="topbar">
      <div id="breadcrumb"></div>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="gsearch" type="text" placeholder="Jump to deal, company, or contact…" autocomplete="off">
        <div id="gsearch-results" class="gsearch-results hidden"></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="navigate('/new')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Deal
        </button>
      </div>
    </header>
    <main id="page"></main>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
const S = {
  deals: [], byId: {}, detail: {},
  sseOk: false,
  curTab: {},
  sort: { col: 'id', dir: 'asc' },
  filters: { type: 'all', tier: 'all', status: 'all' },
  search: '',
};

/* ═══════════════════════════════════════════════════════════
   ROUTER
═══════════════════════════════════════════════════════════ */
function navigate(path) { window.location.hash = '#' + path; }

window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', () => { init(); route(); });

function route() {
  const raw = (window.location.hash.slice(1) || '/').replace(/^\//, '');
  const parts = raw.split('/').filter(Boolean);
  const pg = parts[0] || '';

  ['home','deals','new'].forEach(id => document.getElementById('nav-'+id)?.classList.remove('active'));
  if (!pg)                           document.getElementById('nav-home')?.classList.add('active');
  else if (pg==='deals' && !parts[1]) document.getElementById('nav-deals')?.classList.add('active');
  else if (pg==='new')               document.getElementById('nav-new')?.classList.add('active');

  if (!pg)                    return renderHome();
  if (pg==='deals'&&!parts[1]) return renderDeals();
  if (pg==='deals'&&parts[1]) return renderDetail(decodeURIComponent(parts[1]));
  if (pg==='new')             return renderNew();
  renderHome();
}

function setBc(crumbs) {
  document.getElementById('breadcrumb').innerHTML = crumbs.map((c,i) =>
    i < crumbs.length-1
      ? `<span class="nav-item" style="display:inline;padding:0;cursor:pointer;color:var(--text-3)" onclick="navigate('/${c.path??''}')">${escH(c.label)}</span><span class="sep"> › </span>`
      : `<span class="crumb-cur">${escH(c.label)}</span>`
  ).join('');
}

/* ═══════════════════════════════════════════════════════════
   API
═══════════════════════════════════════════════════════════ */
async function loadDeals() {
  const d = await fetch('/api/deals').then(r=>r.json()).catch(()=>[]);
  S.deals = (d||[]).filter(Boolean);
  S.byId  = Object.fromEntries(S.deals.map(d=>[d.id,d]));
}
async function loadDetail(id) {
  const d = await fetch(`/api/deals/${id}`).then(r=>r.json());
  S.detail[id] = d; return d;
}
async function apiRun()   { return fetch('/api/run',{method:'POST'}).then(r=>r.json()); }
async function apiReset() { return fetch('/api/reset',{method:'POST'}).then(r=>r.json()); }
async function apiAction(id,action,data) {
  return fetch(`/api/deals/${id}/action`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,data})}).then(r=>r.json());
}
async function apiNew(body) {
  return fetch('/api/deals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
}

/* ═══════════════════════════════════════════════════════════
   SSE
═══════════════════════════════════════════════════════════ */
function initSSE() {
  const es = new EventSource('/api/events');
  es.addEventListener('update', e => {
    const {dealId, state:ds} = JSON.parse(e.data);
    if (S.byId[dealId]) S.byId[dealId].state = ds;
    else { const d={id:dealId,company:ds.company,state:ds}; S.byId[dealId]=d; S.deals.push(d); }
    if (S.detail[dealId]) S.detail[dealId].state = ds;
    onUpdate(dealId);
  });
  es.addEventListener('newdeal', e => {
    const {deal,state:ds} = JSON.parse(e.data);
    const d={...deal,state:ds}; S.byId[deal.id]=d;
    if (!S.deals.find(x=>x.id===deal.id)) S.deals.push(d);
    onUpdate(deal.id);
  });
  es.addEventListener('reset',    () => loadDeals().then(route));
  es.addEventListener('complete', () => loadDeals().then(softRefresh));
  es.onopen  = () => { S.sseOk=true;  setConn(true);  };
  es.onerror = () => { S.sseOk=false; setConn(false); };
}
function setConn(ok) {
  const dot=document.getElementById('conn-dot'), lbl=document.getElementById('conn-label');
  if(!dot) return;
  dot.className='conn-dot '+(ok?'live':'err');
  lbl.textContent=ok?'Live':'Reconnecting…';
}
function onUpdate(dealId) {
  const h=(window.location.hash.slice(1)||'/').replace(/^\//,'');
  const parts=h.split('/').filter(Boolean);
  if (!parts[0]) patchHome();
  else if (parts[0]==='deals'&&!parts[1]) patchDealsRow(dealId);
  else if (parts[0]==='deals'&&parts[1]===dealId) softRefresh();
  patchKpis();
}
function softRefresh() { route(); }

/* ═══════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════ */
function escH(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtMoney(n) {
  if(!n&&n!==0) return '—';
  if(n>=1e9) return '$'+(n/1e9).toFixed(1)+'B';
  if(n>=1e6) return '$'+(n/1e6).toFixed(0)+'M';
  return '$'+n.toLocaleString();
}
function fmtK(n)  { if(!n) return '—'; return n>=1000?'$'+(n/1000).toFixed(0)+'k':'$'+n.toLocaleString(); }
function fmtDur(ms) { if(!ms) return null; return ms<1000?ms+'ms':(ms/1000).toFixed(1)+'s'; }
function fmtTs(iso) {
  if(!iso) return '—';
  return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function relTime(iso) {
  if(!iso) return '';
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60) return s+'s ago'; if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago';
}
const SK = ['A','B','C','D','E','F','G'];
const SNAME = {A:'Invoice & Send',B:'Nudge Schedule',C:'Payment Detection',D:'Deal Tagging',E:'CSM Assignment',F:'Copilot Registration',G:'Close & Notify'};
function overallStatus(deal) {
  const st=deal.state; if(!st) return 'pending';
  if(st.needsHumanFollowUp) return 'followup';
  if(SK.some(k=>st.stages[k]==='failed')) return 'failed';
  if(st.stages.G==='complete') return 'complete';
  if(SK.some(k=>st.stages[k]==='running')) return 'running';
  return 'pending';
}
const SLBL = {complete:'Completed',running:'In Progress',pending:'Pending',failed:'Failed',followup:'Needs Follow-Up'};
function pill(s,lbl) { return `<span class="pill pill-${escH(s)}">${escH(lbl??SLBL[s]??s)}</span>`; }
function tierPill(t) { if(!t) return ''; return `<span class="pill pill-${t.toLowerCase()}">${escH(t)}</span>`; }
function typePill(t) {
  if(!t) return ''; const c=t.toLowerCase().replace(/ /g,'-');
  return `<span class="pill pill-${c}">${escH(t)}</span>`;
}
function pips(stages) {
  return SK.map(k=>{const s=stages?.[k]??'pending'; return `<div class="pip ${s}" title="Stage ${k}: ${SNAME[k]} — ${s}"></div>`;}).join('');
}
function hasManual(deal) { return deal.state?.auditLog?.some(e=>e.manual)??false; }
function manualBadge() { return `<span class="manual-badge">⚡ Manual</span>`; }
function actionLabel(a) {
  return {invoice_sent:'Invoice sent',nudge_schedule_created:'Nudge schedule set',payment_received:'Payment received',halt_conflicting_tags:'HALT – conflicting tags',tags_applied:'Tags applied',csm_assigned:'CSM assigned',copilot_registered:'Copilot registered',deal_closed_onboarded:'Deal closed & onboarded',nudge1_sent:'Nudge 1 sent',flagged_needs_followup:'Flagged – needs follow-up',manual_override:'Manual override',force_reassign_csm:'CSM force-reassigned',edit_tags:'Tags edited',resolve_halt:'Halt resolved'}[a] ?? a.replace(/_/g,' ');
}
function toast(msg,dur=3000) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

/* ═══════════════════════════════════════════════════════════
   HOME
═══════════════════════════════════════════════════════════ */
function renderHome() {
  setBc([{label:'Dashboard'}]);
  const kpis=computeKpis(), att=getAttention(), feed=buildFeed();
  document.getElementById('page').innerHTML=`
  <div class="page-head">
    <div><h1>Onboarding Dashboard</h1><p>Live pipeline status across all active deals</p></div>
    <div class="page-head-actions">
      <button class="btn btn-secondary btn-sm" onclick="doReset()">↺ Reset</button>
      <button class="btn btn-primary btn-sm" id="run-btn" onclick="doRun()">▶ Run Pipeline</button>
    </div>
  </div>
  <div class="kpi-grid" id="kpi-grid">${renderKpis(kpis)}</div>
  <div class="home-grid">
    <div class="card">
      <div class="card-head"><h2>Recent Activity</h2><span style="font-size:12px;color:var(--text-3)">${feed.length} events</span></div>
      <div id="activity-feed">${renderFeed(feed)}</div>
    </div>
    <div>
      <div class="card" style="margin-bottom:12px">
        <div class="card-head"><h2>Needs Attention</h2></div>
        <div id="att-list">${renderAtt(att)}</div>
      </div>
      <div class="card">
        <div class="card-head"><h2>Pipeline Summary</h2></div>
        <div class="card-body" style="padding:14px 16px">${renderPipelineSummary()}</div>
      </div>
    </div>
  </div>`;
}

function computeKpis() {
  const ds=S.deals;
  return {
    total:ds.length,
    complete:ds.filter(d=>d.state?.stages?.G==='complete').length,
    running:ds.filter(d=>SK.some(k=>d.state?.stages?.[k]==='running')).length,
    followup:ds.filter(d=>d.state?.needsHumanFollowUp).length,
    revenue:ds.reduce((s,d)=>s+(d.state?.paymentAmount??0),0),
    manual:ds.filter(d=>hasManual(d)).length,
  };
}
function renderKpis(t) {
  return [
    {lbl:'Total Deals',    val:t.total,    sub:'in pipeline',         col:'var(--brand)'},
    {lbl:'Completed',      val:t.complete, sub:'fully onboarded',     col:'var(--green)'},
    {lbl:'In Progress',    val:t.running,  sub:'active stages',       col:'var(--blue)'},
    {lbl:'Needs Follow-Up',val:t.followup, sub:'human action needed', col:'var(--amber)'},
    {lbl:'Revenue',        val:fmtMoney(t.revenue), sub:'collected', col:'var(--brand)', raw:true},
    {lbl:'Manual Actions', val:t.manual,   sub:'deals with overrides',col:'var(--orange)'},
  ].map(k=>`<div class="kpi-card"><div class="kpi-label">${k.lbl}</div><div class="kpi-value" style="color:${k.col}">${k.raw?k.val:k.val}</div><div class="kpi-sub">${k.sub}</div></div>`).join('');
}
function patchKpis() { const el=document.getElementById('kpi-grid'); if(el) el.innerHTML=renderKpis(computeKpis()); }

function buildFeed() {
  const evs=[];
  for(const d of S.deals) for(const e of (d.state?.auditLog??[])) evs.push({...e,dealId:d.id,company:d.company});
  return evs.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,40);
}
function renderFeed(feed) {
  if(!feed.length) return '<div class="card-empty">No activity yet — run the pipeline to get started.</div>';
  return feed.map(e=>{
    const dc=e.manual?'manual':e.action?.includes('closed')?'complete':e.action?.includes('halt')||e.action?.includes('failed')?'failed':e.action?.includes('followup')?'followup':'';
    return `<div class="activity-item">
      <div class="activity-dot ${dc}"></div>
      <div class="activity-body">
        <div class="activity-line">
          <strong onclick="navigate('/deals/${escH(e.dealId)}')" style="cursor:pointer" onmouseover="this.style.color='var(--brand)'" onmouseout="this.style.color=''">${escH(e.company)}</strong>
          — ${escH(actionLabel(e.action))}
          ${e.manual?manualBadge():''}
          <span style="font-size:11px;color:var(--text-3);margin-left:4px">Stage ${escH(e.stage)}</span>
        </div>
      </div>
      <div class="activity-time">${relTime(e.timestamp)}</div>
    </div>`;
  }).join('');
}
function getAttention() {
  return S.deals.filter(d=>{const st=d.state; return st&&(st.needsHumanFollowUp||SK.some(k=>st.stages[k]==='failed')||hasManual(d));});
}
function renderAtt(deals) {
  if(!deals.length) return '<div class="card-empty">No deals need attention.</div>';
  return deals.map(d=>{
    const s=d.state;
    const type=s?.needsHumanFollowUp?'followup':SK.some(k=>s?.stages?.[k]==='failed')?'failed':'manual';
    const sub=s?.haltReason??(s?.needsHumanFollowUp?'Payment overdue — needs contact':'Manual override logged');
    const ic=type==='followup'?'⚠':type==='failed'?'✕':'⚡';
    return `<div class="attention-item" onclick="navigate('/deals/${escH(d.id)}')">
      <div class="att-icon ${type}">${ic}</div>
      <div class="att-body"><div class="att-name">${escH(d.company)}</div><div class="att-sub">${escH(sub)}</div></div>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }).join('');
}
function renderPipelineSummary() {
  const by={}; for(const d of S.deals){const s=overallStatus(d);by[s]=(by[s]||0)+1;}
  const total=S.deals.length||1;
  return [{k:'complete',l:'Completed'},{k:'running',l:'In Progress'},{k:'followup',l:'Needs Follow-Up'},{k:'failed',l:'Failed'},{k:'pending',l:'Pending'}].map(r=>{
    const n=by[r.k]??0,pct=Math.round((n/total)*100);
    const col=r.k==='complete'?'var(--green)':r.k==='running'?'var(--blue)':r.k==='failed'?'var(--red)':r.k==='followup'?'var(--amber)':'var(--border-2)';
    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px"><span>${r.l}</span><span style="font-weight:600">${n}</span></div><div style="height:5px;border-radius:3px;background:var(--border);overflow:hidden"><div style="height:100%;width:${pct}%;border-radius:3px;background:${col};transition:width 0.4s"></div></div></div>`;
  }).join('');
}
function patchHome() {
  const f=document.getElementById('activity-feed'); if(f) f.innerHTML=renderFeed(buildFeed());
  patchKpis();
  const a=document.getElementById('att-list'); if(a) a.innerHTML=renderAtt(getAttention());
}
async function doRun() {
  const btn=document.getElementById('run-btn');
  if(btn){btn.disabled=true;btn.textContent='Starting…';}
  const r=await apiRun();
  toast(r.error?'Already running — wait for completion':'Pipeline started for all 12 deals');
  if(btn){btn.disabled=false;btn.innerHTML='▶ Run Pipeline';}
}
async function doReset() {
  if(!confirm('Reset all deal states? This cannot be undone.')) return;
  await apiReset(); await loadDeals(); toast('All deals reset'); route();
}

/* ═══════════════════════════════════════════════════════════
   ALL DEALS
═══════════════════════════════════════════════════════════ */
function renderDeals() {
  setBc([{label:'Dashboard',path:''},{label:'All Deals'}]);
  document.getElementById('page').innerHTML=`
  <div class="page-head"><div><h1>All Deals</h1><p>${S.deals.length} deals in pipeline</p></div></div>
  <div class="tbl-wrap" id="dtw">${buildDealsTable()}</div>`;
}
function buildDealsTable() {
  const deals=filteredDeals();
  const chips=(key,opts)=>opts.map(v=>`<button class="chip${S.filters[key]===v?' active':''}" onclick="S.filters.${key}='${v}';refreshTbl()">${v==='all'?'All':v}</button>`).join('');
  return `
  <div class="tbl-toolbar">
    <div class="tbl-search-wrap">

}
function th(col,lbl,align) {
  const s=S.sort.col===col,arr=s?(S.sort.dir==='asc'?'↑':'↓'):'↕';
  return `<th class="${s?'sorted':''}"${align==='right'?' style="text-align:right"':''} onclick="sortBy('${col}')">${lbl}<span class="sa">${arr}</span></th>`;
}
function dealRow(d) {
  const st=overallStatus(d),csm=d.state?.assignedCsm,man=hasManual(d);
  return `<tr class="clickable" id="row-${d.id}" onclick="navigate('/deals/${escH(d.id)}')">
    <td class="cell-id">${escH(d.id)}</td>
    <td><div style="font-weight:600">${escH(d.company)}</div><div style="font-size:12px;color:var(--text-3);margin-top:1px">${escH(d.primaryContact?.name??'')}</div></td>
    <td>${typePill(d.dealType)}</td>
    <td class="cell-num">${fmtK(d.invoiceAmount)}</td>
    <td class="cell-num">${fmtMoney(d.aumDollars)}</td>
    <td>${csm?`<div style="font-size:13px;font-weight:500">${escH(csm.name)}</div><div style="margin-top:2px">${tierPill(csm.tier)}</div>`:'<span style="color:var(--text-3)">—</span>'}</td>
    <td><div class="pipeline-pips">${pips(d.state?.stages)}</div></td>
    <td>${pill(st)}</td>
    <td>${man?manualBadge():''}</td>
  </tr>`;
}
function filteredDeals() {
  let ds=[...S.deals];
  const q=S.search.toLowerCase();
  if(q) ds=ds.filter(d=>d.company.toLowerCase().includes(q)||d.id.toLowerCase().includes(q)||(d.primaryContact?.name??'').toLowerCase().includes(q));
  if(S.filters.type!=='all')   ds=ds.filter(d=>d.dealType===S.filters.type);
  if(S.filters.tier!=='all')   ds=ds.filter(d=>d.state?.assignedCsm?.tier===S.filters.tier);
  if(S.filters.status!=='all') ds=ds.filter(d=>overallStatus(d)===S.filters.status);
  const {col,dir}=S.sort;
  ds.sort((a,b)=>{
    let av,bv;
    if(col==='id')      {av=a.id;bv=b.id;}
    else if(col==='company'){av=a.company;bv=b.company;}
    else if(col==='type')  {av=a.dealType;bv=b.dealType;}
    else if(col==='invoice'){av=a.invoiceAmount;bv=b.invoiceAmount;}
    else if(col==='aum')   {av=a.aumDollars;bv=b.aumDollars;}
    else if(col==='csm')   {av=a.state?.assignedCsm?.name??'';bv=b.state?.assignedCsm?.name??'';}
    else if(col==='status'){av=overallStatus(a);bv=overallStatus(b);}
    else{av=a.id;bv=b.id;}
    if(av<bv) return dir==='asc'?-1:1; if(av>bv) return dir==='asc'?1:-1; return 0;
  });
  return ds;
}
function sortBy(col){if(S.sort.col===col)S.sort.dir=S.sort.dir==='asc'?'desc':'asc';else{S.sort.col=col;S.sort.dir='asc';}refreshTbl();}
function refreshTbl(){const w=document.getElementById('dtw');if(w)w.innerHTML=buildDealsTable();}
function patchDealsRow(id){const d=S.byId[id];if(!d)return;const row=document.getElementById('row-'+id);if(row){const t=document.createElement('tbody');t.innerHTML=dealRow(d);row.replaceWith(t.firstChild);}}

let _detailId=null;

async function renderDetail(id) {
  _detailId=id;
  const cached=S.byId[id]??{id,company:id,state:null};
  setBc([{label:'Dashboard',path:''},{label:'All Deals',path:'deals'},{label:cached.company??id}]);
  document.getElementById('page').innerHTML='<div style="text-align:center;padding:60px;color:var(--text-3)">Loading…</div>';
  const det=await loadDetail(id).catch(()=>null);
  if(!det){document.getElementById('page').innerHTML='<div class="card card-body" style="padding:40px;text-align:center;color:var(--text-3)">Deal not found.</div>';return;}
  const{deal:fd,state:st,emails,teamsMutations,replies}=det;
  setBc([{label:'Dashboard',path:''},{label:'All Deals',path:'deals'},{label:fd.company}]);
  if(!S.curTab[id]) S.curTab[id]='overview';
  drawDetail(fd,st,emails,replies,teamsMutations);
}

function drawDetail(fd,st,emails,replies,teamsMutations) {
  const id=fd.id, tab=S.curTab[id]??'overview';
  document.getElementById('page').innerHTML=`
  ${dealHeader(fd,st)}
  <div class="detail-layout">
    <div>
      <div class="tabs">
        ${tabBtn('overview','Overview',id)} ${tabBtn('timeline','Timeline',id)}
        ${tabBtn('emails',`Emails`,id,emails.length+replies.length)}
        ${tabBtn('audit','Audit Log',id,st?.auditLog?.length??0)}
      </div>
      <div id="tab-content">${renderTab(tab,fd,st,emails,replies,teamsMutations)}</div>
    </div>
    <div id="detail-sidebar">${renderSidebar(fd,st,teamsMutations)}</div>
  </div>`;
}

function tabBtn(name,lbl,id,cnt) {
  const active=S.curTab[id]===name;
  const badge=cnt!=null?`<span class="tab-count">${cnt}</span>`:'';
  return `<button class="tab-btn${active?' active':''}" onclick="switchTab('${name}','${escH(id)}')">${lbl}${badge}</button>`;
}
function switchTab(name,id) {
  S.curTab[id]=name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  const d=S.detail[id];
  if(d) document.getElementById('tab-content').innerHTML=renderTab(name,d.deal,d.state,d.emails,d.replies,d.teamsMutations);
}
function renderTab(tab,fd,st,emails,replies,teamsMutations) {
  if(tab==='overview') return renderOverview(fd,st);
  if(tab==='timeline') return renderTimeline(fd,st);
  if(tab==='emails')   return renderEmails(fd,emails,replies);
  if(tab==='audit')    return renderAudit(fd,st);
  return '';
}

function dealHeader(fd,st) {
  const status=overallStatus({state:st}), csm=st?.assignedCsm;

    const r=SK.find(k=>st?.stages?.[k]==='running'); if(r) return `${r}: ${SNAME[r]}`;
    const done=SK.filter(k=>st?.stages?.[k]==='complete'); if(done.length) {const l=done.at(-1);return `${l}: ${SNAME[l]}`;}

  return `<div class="deal-header">
    <div class="deal-header-top">
      <div class="deal-header-title">
        <h1>${escH(fd.company)}</h1>
        <div class="deal-meta">

          ${st?.needsHumanFollowUp?'<span class="pill pill-followup">⚠ Needs Follow-Up</span>':''}
          ${hasManual({state:st})?manualBadge():''}

      ${csm?`<div class="deal-stat"><div class="deal-stat-label">CSM</div><div class="deal-stat-value" style="font-size:14px">${escH(csm.name)}</div></div>`:''}

/* ── Timeline ─ */
function renderTimeline(fd,st) {
  if(!st) return '<div class="card card-empty">No pipeline data yet.</div>';
  const manualEntries=(st.auditLog??[]).filter(e=>e.manual);
  const items=[];
  for(const k of SK) {
    items.push({type:'stage',k,status:st.stages[k]??'pending',startTs:st.stageStartedAt?.[k],dur:st.stageDurations?.[k]});
    for(const m of manualEntries.filter(e=>e.stage===k)) items.push({type:'manual',e:m});
  }
  for(const m of manualEntries.filter(e=>!SK.includes(e.stage))) items.push({type:'manual',e:m});
  return `<div class="timeline">${items.map(item=>tlItem(item,fd,st)).join('')}</div>`;
}
function tlItem(item,fd,st) {
  if(item.type==='manual') {
    const e=item.e;
    return `<div class="tl-item"><div class="tl-dot manual">⚡</div><div class="tl-card manual-card">
      <div class="tl-card-head"><div class="tl-stage-badge manual">M</div><div class="tl-title">Manual Action ${manualBadge()}</div><div class="tl-time">${fmtTs(e.timestamp)}</div></div>
      <div class="tl-rows">
        <div class="tl-row"><div class="tl-k">Action</div><div class="tl-v">${escH(actionLabel(e.action))}</div></div>
        ${e.data&&Object.keys(e.data).length?`<div class="tl-row"><div class="tl-k">Data</div><div class="tl-v" style="font-family:monospace;font-size:11px;color:var(--text-3)">${escH(JSON.stringify(e.data))}</div></div>`:''}
      </div>
    </div></div>`;
  }
  const {k,status,startTs,dur}=item;
  const drows=[];
  if(k==='A'&&st.invoiceId){drows.push(['Invoice ID',`<span class="tl-v mono">${escH(st.invoiceId)}</span>`]);if(st.dueDate)drows.push(['Due Date',escH(st.dueDate)]);}
  if(k==='B'){if(st.nudge1Date)drows.push(['Nudge 1',escH(st.nudge1Date)]);if(st.nudge2Date)drows.push(['Nudge 2',escH(st.nudge2Date)]);}
  if(k==='C'){if(st.paymentAmount)drows.push(['Received',`<strong>${fmtK(st.paymentAmount)}</strong>`]);if(st.invoicePaidAt)drows.push(['Paid At',fmtTs(st.invoicePaidAt)]);if(st.nudgesSent?.length)drows.push(['Nudges',escH(st.nudgesSent.join(', '))]);if(st.paymentWaitMs)drows.push(['Wait',fmtDur(st.paymentWaitMs)]);if(st.needsHumanFollowUp)drows.push(['Follow-Up','<span class="pill pill-followup">Needs human contact</span>']);}
  if(k==='D'){if(st.tagsApplied?.length)drows.push(['Tags',st.tagsApplied.map(escH).join(', ')]);if(st.haltReason)drows.push(['Halt',`<span style="color:var(--red)">${escH(st.haltReason)}</span>`]);}
  if(k==='E'&&st.assignedCsm){drows.push(['CSM',`${escH(st.assignedCsm.name)} · ${escH(st.assignedCsm.region)}`]);drows.push(['Tier',tierPill(st.assignedCsm.tier)]);}
  if(k==='F'&&st.copilotCompanyId){drows.push(['Company ID',`<span class="tl-v mono">${escH(st.copilotCompanyId)}</span>`]);if(st.copilotClientIds?.length)drows.push(['Clients',String(st.copilotClientIds.length)]);}
  if(k==='G'&&status==='complete'){drows.push(['HubSpot','Marked Closed Won']);drows.push(['Emails','CSM notification + client welcome sent']);}
  const dotCls=status==='pending'?'pending':status;
  const dotIcon=status==='complete'?'✓':status==='failed'?'✕':status==='running'?'◌':'○';
  const badgeCls=status==='pending'?'dim':status==='failed'?'fail':'';
  const cardCls=status==='failed'?'failed-card':(k==='C'&&st.needsHumanFollowUp)?'followup-card':'';
  return `<div class="tl-item"><div class="tl-dot ${dotCls}">${dotIcon}</div><div class="tl-card ${cardCls}">
    <div class="tl-card-head">
      <div class="tl-stage-badge ${badgeCls}">${k}</div>
      <div class="tl-title">${escH(SNAME[k])}</div>
      ${pill(status)}
      ${startTs?`<div class="tl-time">${fmtTs(startTs)}</div>`:''}
      ${dur?`<span class="tl-dur">${fmtDur(dur)}</span>`:''}
    </div>
    ${drows.length?`<div class="tl-rows">${drows.map(([kk,vv])=>`<div class="tl-row"><div class="tl-k">${escH(kk)}</div><div class="tl-v">${vv}</div></div>`).join('')}</div>`:''}
  </div></div>`;
}

/* ── Emails ─ */

async function submitManual(id) {
  const action=document.getElementById('m-action')?.value?.trim();
  const notes=document.getElementById('m-notes')?.value?.trim();
  const stage=document.getElementById('m-stage')?.value;
  if(!action){toast('Enter an action name');return;}
  await apiAction(id,action,{notes,stage});
  toast('Manual action logged');
  const d=await loadDetail(id);
  document.getElementById('tab-content').innerHTML=renderAudit(d.deal,d.state);
}

    ${st.invoiceId?srow('Invoice',escH(st.invoiceId),true):''}
    ${st.copilotCompanyId?srow('Copilot Co.',escH(st.copilotCompanyId),true):''}
    ${(st.copilotClientIds??[]).map((c,i)=>srow(`Client ${i+1}`,escH(c),true)).join('')}
    ${st.teamsCardId?srow('Teams Card',escH(st.teamsCardId),true):''}
  </div>`:''}
  ${teamsMutations?.length?`<div class="sidebar-section"><div class="sidebar-section-head">Teams History (${teamsMutations.length})</div>
    ${teamsMutations.map(m=>`<div class="sidebar-row"><div class="sidebar-row-label">${escH(m.type)} · ${fmtTs(m.timestamp)}</div><div class="sidebar-row-value" style="font-size:12px">${escH(m.patchReason??m.cardState?.headerStage??'')}</div></div>`).join('')}
  </div>`:''}
  ${st?.stageDurations&&Object.keys(st.stageDurations).length?`<div class="sidebar-section"><div class="sidebar-section-head">Stage Durations</div>
    ${SK.filter(k=>st.stageDurations?.[k]!=null).map(k=>`<div class="sidebar-row"><div class="sidebar-row-label">Stage ${k} — ${escH(SNAME[k])}</div><div class="sidebar-row-value">${fmtDur(st.stageDurations[k])}</div></div>`).join('')}
  </div>`:''}`;
}

      <div class="form-group"><label for="fse">Subscription End Date</label><input class="fc" id="fse" type="date"></div>
      <div class="form-group s2"><label for="fev">Events (comma-separated)</label><input class="fc" id="fev" placeholder="Global Alts Miami 2026, Family Office Summit NYC 2026"><div class="fhint">Match event names exactly from the fixture list</div></div>
    </div></div>

    <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--border)">
      <button class="btn btn-secondary" onclick="navigate('/deals')">Cancel</button>

async function submitDeal() {
  const g=id=>document.getElementById(id)?.value?.trim();
  const fc=g('fc'),ft=g('ft'),fi=g('fi'),fa=g('fa'),fcn=g('fcn'),fce=g('fce'),fcm=g('fcm'),frn=g('frn'),fre=g('fre');
  if(!fc||!ft||!fi||!fa||!fcn||!fce||!fcm||!frn||!fre){toast('Fill in all required fields');return;}
  const btn=document.getElementById('sbtn');
  btn.disabled=true; btn.textContent='Creating…';
  const evRaw=g('fev'), se=g('fse');
  try {
    const r=await apiNew({company:fc,dealType:ft,invoiceAmount:Number(fi),aumDollars:Number(fa),primaryContact:{name:fcn,email:fce,mobile:fcm},salesRepName:frn,salesRepEmail:fre,subscriptionEndDate:se||null,events:evRaw?evRaw.split(',').map(e=>e.trim()).filter(Boolean):[]});
    if(r.dealId){toast(`Deal ${r.dealId} created — pipeline running`);await loadDeals();navigate('/deals/'+r.dealId);}
    else{toast(r.error??'Failed to create deal');btn.disabled=false;btn.textContent='+ Create Deal & Start Pipeline';}
  } catch{toast('Network error');btn.disabled=false;btn.textContent='+ Create Deal & Start Pipeline';}
}

/* ═══════════════════════════════════════════════════════════
   GLOBAL SEARCH
═══════════════════════════════════════════════════════════ */
function initSearch() {
  const inp=document.getElementById('gsearch'), res=document.getElementById('gsearch-results');
  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toLowerCase();
    if(!q){res.classList.add('hidden');return;}
    const matches=S.deals.filter(d=>d.company.toLowerCase().includes(q)||d.id.toLowerCase().includes(q)||(d.primaryContact?.name??'').toLowerCase().includes(q)).slice(0,8);
    if(!matches.length){res.classList.add('hidden');return;}
    res.classList.remove('hidden');
    res.innerHTML=matches.map(d=>`<div class="gsearch-item" onclick="inp.value='';res.classList.add('hidden');navigate('/deals/${escH(d.id)}')">
      <span class="gsearch-item-id">${escH(d.id)}</span>
      <span class="gsearch-item-name">${escH(d.company)}</span>
      ${pill(overallStatus(d))}
    </div>`).join('');
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Escape'){inp.value='';res.classList.add('hidden');}});
  document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))res.classList.add('hidden');});
}

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
async function init() {
  initSearch();
  initSSE();
  await loadDeals();
}
